---
- name: Install wireguard
  ansible.builtin.package:
    name: wireguard-tools
    state: present
  become: true
  notify: Restart wireguard

- name: Configure IP forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
  become: true
  notify: Restart wireguard

- name: Write wireguard keys
  ansible.builtin.copy:
    content: "{{ item.content }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0600"
  loop:
    - dest: /etc/wireguard/privatekey
      content: "{{ wireguard_privkey }}"
    - dest: /etc/wireguard/publickey
      content: "{{ wireguard_pubkey }}"
  become: true
  no_log: true
  notify: Restart wireguard

- name: Write configuration
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: "0600"
  become: true
  notify: Restart wireguard

- name: Create data dir
  ansible.builtin.file:
    path: "{{ wireguard_peer_configs }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true

- name: Template client configs
  ansible.builtin.template:
    src: client.conf.j2
    dest: "{{ wireguard_peer_configs }}/wg{{ idx0 }}.conf"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ wireguard_peers }}"
  loop_control:
    loop_var: peer
    index_var: idx0
  become: true
